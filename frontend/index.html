<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OneEachMonth</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ── Light theme ─────────────────────────────────────────── */
  :root {
    --ink:        #1c1917;
    --ink-soft:   #57534e;
    --ink-faint:  #a8a29e;
    --page:       #fffbf5;
    --card:       #ffffff;
    --card2:      #faf7f2;
    --rule:       #e7e2d9;
    --accent:     #7c3aed;
    --accent-bg:  #f3eeff;
    --accent2:    #ea580c;
    --accent2-bg: #fff4ee;
    --gold:       #d97706;
    --gold-bg:    #fffbeb;
    --success:    #059669;
    --success-bg: #ecfdf5;
    --danger:     #dc2626;
    --shadow-sm:  0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-md:  0 4px 8px rgba(0,0,0,0.06), 0 12px 32px rgba(0,0,0,0.08);
    --radius:     14px;
    --radius-sm:  8px;
  }

  /* ── Dark theme ──────────────────────────────────────────── */
  [data-theme="dark"] {
    --ink:        #f5f0e8;
    --ink-soft:   #a8a29e;
    --ink-faint:  #57534e;
    --page:       #131110;
    --card:       #1e1b18;
    --card2:      #252118;
    --rule:       #2e2a26;
    --accent:     #a78bfa;
    --accent-bg:  #1e1730;
    --accent2:    #fb923c;
    --accent2-bg: #271608;
    --gold:       #fbbf24;
    --gold-bg:    #1c1504;
    --success:    #34d399;
    --success-bg: #022c22;
    --danger:     #f87171;
    --shadow-sm:  0 1px 4px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    --shadow-md:  0 4px 8px rgba(0,0,0,0.3), 0 12px 32px rgba(0,0,0,0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--page);
    color: var(--ink);
    min-height: 100vh;
    transition: background .25s, color .25s;
  }

  /* ── Layout ──────────────────────────────────────────────── */
  #app { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }

  /* ── Header ──────────────────────────────────────────────── */
  header {
    padding: 28px 0 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1.5px solid var(--rule);
    margin-bottom: 44px;
  }

  .logo-wrap { display: flex; flex-direction: column; gap: 2px; }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.9rem;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  #user-greeting {
    font-size: 0.85rem;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  /* ── Dark mode toggle ────────────────────────────────────── */
  .theme-toggle {
    width: 44px; height: 24px;
    background: var(--rule);
    border-radius: 12px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background .2s;
    flex-shrink: 0;
  }

  .theme-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--card);
    box-shadow: var(--shadow-sm);
    transition: transform .2s, background .2s;
  }

  [data-theme="dark"] .theme-toggle { background: var(--accent); }
  [data-theme="dark"] .theme-toggle::after { transform: translateX(20px); }

  .theme-icon { font-size: 0.85rem; }

  /* ── Buttons ─────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; border: none;
    transition: opacity .15s, transform .1s, box-shadow .15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn:hover  { opacity: .88; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: #fff;
    box-shadow: 0 4px 14px rgba(124,58,237,.35);
  }
  [data-theme="dark"] .btn-primary {
    box-shadow: 0 4px 14px rgba(167,139,250,.25);
  }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--rule);
    color: var(--ink-soft);
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    padding: 7px 12px;
  }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
  .btn-danger { background: var(--danger); color: #fff; }

  /* ── Auth panel ──────────────────────────────────────────── */
  #auth-panel {
    max-width: 440px;
    margin: 40px auto 0;
  }

  .auth-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 40px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--rule);
  }

  .auth-emoji {
    font-size: 2.5rem;
    margin-bottom: 14px;
    display: block;
  }

  .auth-card h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.7rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .auth-card .sub {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .toggle-auth {
    text-align: center;
    margin-top: 20px;
    font-size: 0.84rem;
    color: var(--ink-soft);
  }

  .toggle-auth a {
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }

  /* ── Forms ───────────────────────────────────────────────── */
  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 0.78rem; font-weight: 600;
    letter-spacing: .07em; text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  input, textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    background: var(--card2);
    color: var(--ink);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  textarea { resize: vertical; min-height: 80px; }

  .error-msg   { color: var(--danger);  font-size: 0.82rem; margin-top: 8px; }
  .success-msg { color: var(--success); font-size: 0.82rem; margin-top: 8px; }

  /* ── Tabs ────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--card2);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 36px;
    border: 1px solid var(--rule);
    width: fit-content;
  }

  .tab-btn {
    padding: 9px 22px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer;
    background: none; border: none;
    color: var(--ink-soft);
    border-radius: 10px;
    transition: all .15s;
  }

  .tab-btn.active {
    background: var(--card);
    color: var(--accent);
    box-shadow: var(--shadow-sm);
  }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── Month badge ─────────────────────────────────────────── */
  .month-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--accent-bg), var(--accent2-bg));
    border: 1px solid var(--rule);
    color: var(--accent);
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  /* ── Section title ───────────────────────────────────────── */
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem; font-weight: 700;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .badge-success { background: var(--success-bg); color: var(--success); }
  .badge-warn    { background: var(--gold-bg);    color: var(--gold); }
  .badge-neutral { background: var(--card2);      color: var(--ink-soft); border: 1px solid var(--rule); }

  /* ── My submission ───────────────────────────────────────── */
  #my-submission {
    background: var(--card);
    border-radius: var(--radius);
    padding: 30px;
    box-shadow: var(--shadow-md);
    margin-bottom: 52px;
    border: 1px solid var(--rule);
    position: relative;
    overflow: hidden;
  }

  #my-submission::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .expression-display {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem; font-weight: 700;
    font-style: italic;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .def-block {
    background: var(--card2);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-top: 16px;
    border: 1px solid var(--rule);
  }

  .def-label {
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 5px;
  }

  .def-block p {
    font-size: 0.88rem;
    color: var(--ink-soft);
    line-height: 1.65;
  }

  /* ── Submission grid ─────────────────────────────────────── */
  #all-submissions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
    gap: 16px;
  }

  .sub-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--rule);
    transition: transform .18s, box-shadow .18s;
    position: relative;
    overflow: hidden;
  }

  .sub-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity .18s;
  }

  .sub-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .sub-card:hover::after { opacity: 1; }

  .sub-card.empty {
    background: var(--card2);
    box-shadow: none;
    border: 1.5px dashed var(--rule);
  }
  .sub-card.empty:hover { transform: none; box-shadow: none; }
  .sub-card.empty::after { display: none; }

  .card-user {
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }

  .card-user .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  .card-expr {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem; font-style: italic; font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .sub-card.empty .card-expr {
    color: var(--ink-faint);
    font-style: normal;
    font-size: 0.88rem;
    font-family: 'Inter', sans-serif;
  }

  .card-def {
    font-size: 0.8rem;
    color: var(--ink-soft);
    line-height: 1.55;
    border-top: 1px solid var(--rule);
    padding-top: 10px;
    margin-top: 4px;
  }

  .card-date {
    font-size: 0.7rem;
    color: var(--ink-faint);
    margin-top: 12px;
    display: flex; align-items: center; gap: 4px;
  }

  /* ── Month nav ───────────────────────────────────────────── */
  .month-nav {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .month-btn {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 0.8rem; font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--rule);
    background: var(--card);
    color: var(--ink-soft);
    transition: all .15s;
  }

  .month-btn:hover { border-color: var(--accent); color: var(--accent); }

  .month-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 3px 10px rgba(124,58,237,.3);
  }

  /* ── Spinner ─────────────────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Divider ─────────────────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--rule);
    margin: 40px 0;
  }

  /* ── Stats row ───────────────────────────────────────────── */
  .stats-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .stat-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    box-shadow: var(--shadow-sm);
  }

  .stat-chip .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem; font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }

  .stat-chip .stat-label {
    font-size: 0.75rem; color: var(--ink-soft);
    line-height: 1.3;
  }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 520px) {
    header { flex-direction: column; align-items: flex-start; }
    .header-right { width: 100%; justify-content: space-between; }
    .auth-card { padding: 28px 20px; }
    #all-submissions { grid-template-columns: 1fr; }
    .tabs { width: 100%; }
    .tab-btn { flex: 1; text-align: center; }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo-wrap">
      <div class="logo">OneEachMonth</div>
      <div class="tagline">One expression. Every month.</div>
    </div>
    <div class="header-right">
      <div id="user-greeting"></div>
      <span class="theme-icon">☀️</span>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>
      <span class="theme-icon">🌙</span>
    </div>
  </header>

  <!-- Auth -->
  <div id="auth-panel" style="display:none">
    <div class="auth-card">
      <span class="auth-emoji" id="auth-emoji">👋</span>
      <h2 id="auth-title">Welcome back</h2>
      <p class="sub" id="auth-sub">Sign in with your username and email — no password needed.</p>

      <div id="reg-fields" style="display:none">
        <div class="form-group">
          <label>Choose a username</label>
          <input id="reg-username" type="text" placeholder="your_name" autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label id="identifier-label">Username</label>
        <input id="auth-identifier" type="text" placeholder="your_name" autocomplete="username" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input id="auth-email" type="email" placeholder="you@email.com" autocomplete="email" />
      </div>

      <div id="auth-error" class="error-msg"></div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="submitAuth()">
        <span id="auth-btn-text">Sign in</span>
      </button>

      <div class="toggle-auth" id="auth-toggle">
        Don't have an account? <a onclick="toggleAuthMode()">Create one</a>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="main-panel" style="display:none">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('submit', this)">✍️ My Submission</button>
      <button class="tab-btn" onclick="switchTab('all', this)">🌍 All Expressions</button>
    </div>

    <!-- My submission tab -->
    <div class="tab-pane active" id="tab-submit">
      <div class="month-pill">📅 <span id="current-month-label"></span></div>
      <div class="section-title">
        This month's expression
        <span class="badge" id="my-status-badge"></span>
      </div>

      <div id="my-submission">
        <div id="submitted-view" style="display:none">
          <div class="expression-display" id="my-expr-display"></div>
          <div class="def-block" id="my-def-block" style="display:none">
            <div class="def-label">📖 Meaning &amp; Example</div>
            <p id="my-def-text"></p>
          </div>
          <div style="margin-top:18px">
            <button class="btn btn-outline btn-sm" onclick="editSubmission()">✏️ Edit</button>
          </div>
        </div>

        <div id="input-view">
          <div class="form-group">
            <label>Your expression for <span id="month-for-label"></span></label>
            <textarea id="expr-input" placeholder='e.g. "Hit the nail on the head"' rows="3"></textarea>
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="submitExpression()">
              ✨ Save &amp; look up meaning
            </button>
            <span id="lookup-spinner" style="display:none">
              <span class="spinner"></span> <span style="font-size:.84rem;color:var(--ink-soft)">Looking up...</span>
            </span>
          </div>
          <div id="submit-error" class="error-msg"></div>
          <div id="lookup-result" style="margin-top:18px;display:none">
            <div class="def-block">
              <div class="def-label">📖 Meaning &amp; Example</div>
              <p id="lookup-text"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- All tab -->
    <div class="tab-pane" id="tab-all">
      <div class="month-nav" id="month-nav"></div>
      <div class="stats-row" id="stats-row"></div>
      <div class="section-title">
        Expressions
        <span class="badge badge-neutral" id="all-count-badge"></span>
      </div>
      <div id="all-submissions"></div>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────
const API_BASE = 'https://oneeachmonth-data.onrender.com';

// ── State ─────────────────────────────────────────────────────────────
let currentUser    = null;
let allSubmissions = [];
let selectedMonth  = null;
let isRegister     = false;

// ── Theme ─────────────────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('oem_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('oem_theme', next);
}

initTheme();

// ── Init ──────────────────────────────────────────────────────────────
(async function init() {
  const saved = localStorage.getItem('oem_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    await showMain();
  } else {
    showAuth();
  }
})();

// ── Auth ──────────────────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-panel').style.display = '';
  document.getElementById('main-panel').style.display = 'none';
  document.getElementById('user-greeting').innerHTML = '';
}

function toggleAuthMode() {
  isRegister = !isRegister;
  document.getElementById('auth-emoji').textContent     = isRegister ? '🌱' : '👋';
  document.getElementById('auth-title').textContent     = isRegister ? 'Create account' : 'Welcome back';
  document.getElementById('auth-sub').textContent       = isRegister
    ? 'Pick a username and enter your email — that\'s all you need.'
    : 'Enter your username and email to continue.';
  document.getElementById('reg-fields').style.display   = isRegister ? '' : 'none';
  document.getElementById('identifier-label').textContent = isRegister ? 'Username (confirm)' : 'Username';
  document.getElementById('auth-btn-text').textContent  = isRegister ? 'Create account' : 'Sign in';
  document.getElementById('auth-toggle').innerHTML      = isRegister
    ? 'Already have an account? <a onclick="toggleAuthMode()">Sign in</a>'
    : 'Don\'t have an account? <a onclick="toggleAuthMode()">Create one</a>';
  document.getElementById('auth-error').textContent = '';
}

async function submitAuth() {
  const identifier = document.getElementById('auth-identifier').value.trim();
  const email      = document.getElementById('auth-email').value.trim();
  const errEl      = document.getElementById('auth-error');
  errEl.textContent = '';

  if (!identifier || !email) { errEl.textContent = 'Please fill in both fields.'; return; }

  try {
    let endpoint, body;
    if (isRegister) {
      const username = document.getElementById('reg-username').value.trim();
      if (!username) { errEl.textContent = 'Please choose a username.'; return; }
      endpoint = '/api/register';
      body = { username, email, password: 'no-password-' + Date.now() };
    } else {
      endpoint = '/api/login-no-password';
      body = { identifier, email };
    }

    const r = await fetch(API_BASE + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || 'Something went wrong.'; return; }

    currentUser = data;
    localStorage.setItem('oem_user', JSON.stringify(currentUser));
    await showMain();
  } catch (e) {
    errEl.textContent = 'Cannot reach server. Check your connection.';
  }
}

// ── Main ──────────────────────────────────────────────────────────────
async function showMain() {
  document.getElementById('auth-panel').style.display = 'none';
  document.getElementById('main-panel').style.display = '';

  const initials = currentUser.username.slice(0, 2).toUpperCase();
  document.getElementById('user-greeting').innerHTML = `
    <div class="avatar">${initials}</div>
    <span>Hi, <strong>${currentUser.username}</strong></span>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
  `;

  await fetch(API_BASE + '/api/ensure-slots', { method: 'POST' }).catch(() => {});
  await loadAll();
  renderMySubmission();
}

function signOut() {
  localStorage.removeItem('oem_user');
  currentUser = null;
  showAuth();
}

// ── Data ──────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const r = await fetch(API_BASE + '/api/submissions');
    allSubmissions = await r.json();
  } catch (e) { allSubmissions = []; }

  const months = [...new Set(allSubmissions.map(s => s.month))].sort().reverse();
  selectedMonth = selectedMonth || months[0] || currentMonthStr();
  renderMonthNav(months);
  renderAllGrid();
}

function currentMonthStr() {
  return new Date().toISOString().slice(0, 7);
}

function formatMonth(m) {
  const [y, mo] = m.split('-');
  return new Date(+y, +mo - 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
}

// ── My submission ─────────────────────────────────────────────────────
function renderMySubmission() {
  const m = currentMonthStr();
  document.getElementById('current-month-label').textContent = formatMonth(m);
  document.getElementById('month-for-label').textContent = formatMonth(m);

  const mine = allSubmissions.find(s => s.userId === currentUser._id && s.month === m);

  if (mine && mine.expression) {
    const badge = document.getElementById('my-status-badge');
    badge.textContent = '✓ Submitted';
    badge.className = 'badge badge-success';
    document.getElementById('submitted-view').style.display = '';
    document.getElementById('input-view').style.display = 'none';
    document.getElementById('my-expr-display').textContent = `"${mine.expression}"`;

    if (mine.definition) {
      document.getElementById('my-def-block').style.display = '';
      document.getElementById('my-def-text').innerHTML =
        `<strong>Meaning:</strong> ${mine.definition}` +
        (mine.example ? `<br><br><strong>Example:</strong> <em>${mine.example}</em>` : '');
    } else {
      document.getElementById('my-def-block').style.display = 'none';
    }
  } else {
    const badge = document.getElementById('my-status-badge');
    badge.textContent = '⏳ Pending';
    badge.className = 'badge badge-warn';
    document.getElementById('submitted-view').style.display = 'none';
    document.getElementById('input-view').style.display = '';
    document.getElementById('expr-input').value = mine?.expression || '';
    document.getElementById('lookup-result').style.display = 'none';
  }
}

function editSubmission() {
  const m = currentMonthStr();
  const mine = allSubmissions.find(s => s.userId === currentUser._id && s.month === m);
  document.getElementById('submitted-view').style.display = 'none';
  document.getElementById('input-view').style.display = '';
  document.getElementById('expr-input').value = mine?.expression || '';
  document.getElementById('lookup-result').style.display = 'none';
}

async function submitExpression() {
  const expression = document.getElementById('expr-input').value.trim();
  const errEl = document.getElementById('submit-error');
  errEl.textContent = '';
  if (!expression) { errEl.textContent = 'Please enter an expression.'; return; }

  document.getElementById('lookup-spinner').style.display = '';
  let definition = '', example = '';
  try {
    const lookup = await lookupExpression(expression);
    definition = lookup.definition;
    example    = lookup.example;
    if (definition) {
      document.getElementById('lookup-text').innerHTML =
        `<strong>Meaning:</strong> ${definition}` +
        (example ? `<br><br><strong>Example:</strong> <em>${example}</em>` : '');
      document.getElementById('lookup-result').style.display = '';
    }
  } catch (_) {}
  document.getElementById('lookup-spinner').style.display = 'none';

  try {
    const r = await fetch(API_BASE + '/api/submissions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser._id, username: currentUser.username, expression, definition, example })
    });
    if (!r.ok) { const d = await r.json(); errEl.textContent = d.error; return; }
    await loadAll();
    renderMySubmission();
  } catch (e) {
    errEl.textContent = 'Could not save. Check your connection.';
  }
}

// ── Dictionary ────────────────────────────────────────────────────────
async function lookupExpression(expr) {
  const words = expr.replace(/["""'']/g, '').split(/\s+/).filter(w => w.length > 3);
  const keyword = words[0] || expr;
  const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(keyword)}`);
  if (!r.ok) return { definition: '', example: '' };
  const data = await r.json();
  if (!Array.isArray(data) || !data[0]) return { definition: '', example: '' };
  let definition = '', example = '';
  for (const m of (data[0].meanings || [])) {
    for (const def of (m.definitions || [])) {
      if (def.definition) definition = def.definition;
      if (def.example)    example    = def.example;
      if (definition && example) break;
    }
    if (definition) break;
  }
  return { definition, example };
}

// ── All grid ──────────────────────────────────────────────────────────
function renderMonthNav(months) {
  document.getElementById('month-nav').innerHTML = months.map(m => `
    <button class="month-btn ${m === selectedMonth ? 'active' : ''}" onclick="selectMonth('${m}')">
      ${formatMonth(m)}
    </button>
  `).join('');
}

function selectMonth(m) {
  selectedMonth = m;
  renderMonthNav([...new Set(allSubmissions.map(s => s.month))].sort().reverse());
  renderAllGrid();
}

function renderAllGrid() {
  const forMonth = allSubmissions.filter(s => s.month === selectedMonth);
  const filled   = forMonth.filter(s => s.expression).length;
  const total    = forMonth.length;

  document.getElementById('all-count-badge').textContent = `${filled} / ${total} submitted`;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-chip">
      <div>
        <div class="stat-num">${filled}</div>
        <div class="stat-label">Submitted</div>
      </div>
    </div>
    <div class="stat-chip">
      <div>
        <div class="stat-num">${total - filled}</div>
        <div class="stat-label">Pending</div>
      </div>
    </div>
    <div class="stat-chip">
      <div>
        <div class="stat-num">${total}</div>
        <div class="stat-label">Members</div>
      </div>
    </div>
  `;

  const grid = document.getElementById('all-submissions');
  if (!forMonth.length) {
    grid.innerHTML = '<p style="color:var(--ink-soft);font-size:.9rem">No data for this month yet.</p>';
    return;
  }

  grid.innerHTML = forMonth.map(s => {
    const isEmpty = !s.expression;
    const date = s.submittedAt
      ? new Date(s.submittedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : '';
    return `
      <div class="sub-card ${isEmpty ? 'empty' : ''}">
        <div class="card-user"><span class="dot"></span>${s.username}</div>
        <div class="card-expr">${isEmpty ? 'Not submitted yet' : `"${s.expression}"`}</div>
        ${!isEmpty && s.definition ? `<div class="card-def">${s.definition}</div>` : ''}
        ${date ? `<div class="card-date">🗓 ${date}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ── Tabs ──────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}
</script>
